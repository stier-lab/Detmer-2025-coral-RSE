<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coral RSE Model Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <!-- Ambient background layers -->
  <div class="bg-gradient"></div>
  <div class="bg-grain"></div>

  <div id="app">
    <header class="header">
      <div class="header-left">
        <h1>Coral RSE Model</h1>
        <p class="subtitle"><em>Acropora palmata</em> — Size-structured population dynamics</p>
      </div>
      <div class="header-right">
        <p class="equation-display">N(t+1) = (T + F) × (S ⊙ N(t)) + R(t)</p>
      </div>
    </header>

    <div class="controls">
      <div class="control-section">
        <span class="control-label">Layers</span>
        <div class="toggle-group">
          <label class="toggle-pill" data-color="disturbance">
            <input type="checkbox" data-layer="disturbance" />
            <span class="pill-inner">Disturbance</span>
          </label>
          <label class="toggle-pill" data-color="stochasticity">
            <input type="checkbox" data-layer="stochasticity" />
            <span class="pill-inner">Stochasticity</span>
          </label>
          <label class="toggle-pill" data-color="costs">
            <input type="checkbox" data-layer="costs" />
            <span class="pill-inner">Costs</span>
          </label>
          <label class="toggle-pill" data-color="density">
            <input type="checkbox" data-layer="density" />
            <span class="pill-inner">Density Dep.</span>
          </label>
        </div>
      </div>

      <div class="control-section">
        <span class="control-label">Pathway</span>
        <select id="pathway-select">
          <option value="">All pathways</option>
          <option value="wild">Wild recruits</option>
          <option value="0tx">0_TX · immediate</option>
          <option value="1tx">1_TX · 1-yr grow-out</option>
          <option value="transplant">Transplant</option>
        </select>
      </div>

      <div class="control-section">
        <button id="expand-all" class="btn">Expand All</button>
        <button id="collapse-all" class="btn">Collapse All</button>
      </div>
    </div>

    <div class="diagram-container">
      <svg id="diagram"></svg>
    </div>

    <div id="tooltip" class="tooltip hidden">
      <div class="tooltip-title"></div>
      <div class="tooltip-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
