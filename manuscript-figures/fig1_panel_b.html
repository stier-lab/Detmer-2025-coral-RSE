<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Figure 1 — RSE Demographic Flow Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAFAF7;
    font-family: 'Source Sans 3', 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  svg { width: 740px; height: 600px; }
</style>
</head>
<body>
<svg viewBox="0 0 740 625" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer>
  </filter>
  <filter id="wash" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="30"/></filter>
  <filter id="lift" x="-3%" y="-2%" width="106%" height="110%">
    <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1B4965" flood-opacity="0.06"/>
  </filter>

  <linearGradient id="lab-f" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F2CC8F" stop-opacity="0.14"/><stop offset="100%" stop-color="#F2CC8F" stop-opacity="0.04"/>
  </linearGradient>
  <linearGradient id="orch-f" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#81B29A" stop-opacity="0.14"/><stop offset="100%" stop-color="#81B29A" stop-opacity="0.04"/>
  </linearGradient>
  <linearGradient id="reef-f" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5FA8D3" stop-opacity="0.14"/><stop offset="100%" stop-color="#5FA8D3" stop-opacity="0.04"/>
  </linearGradient>

  <marker id="a-grn" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0.6 L7,2.5 L0,4.4" fill="#81B29A"/></marker>
  <marker id="a-teal" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0.5 L9,3 L0,5.5" fill="#3D8B6E"/></marker>
  <marker id="a-coral" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0.5 L9,3 L0,5.5" fill="#E07A5F"/></marker>
  <marker id="a-navy" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0.5 L9,3 L0,5.5" fill="#1B4965"/></marker>
  <marker id="a-slate" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0.6 L8,2.5 L0,4.4" fill="#6B7680"/></marker>
  <marker id="a-sand" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0.6 L7,2.5 L0,4.4" fill="#9A7340"/></marker>
  <marker id="a-shrink" markerWidth="7" markerHeight="5" refX="1" refY="2.5" orient="auto"><path d="M7,0.6 L0,2.5 L7,4.4" fill="#B85A40"/></marker>

  <symbol id="coral-nub" viewBox="0 0 40 40">
    <rect x="4" y="34" width="32" height="3" rx="1.5" fill="currentColor" opacity="0.2"/>
    <path d="M15 34 C14 32 13 31 14 30 C15 29 17 28 20 28 C23 28 25 29 26 30 C27 31 26 32 25 34Z" fill="currentColor" opacity="0.7"/>
  </symbol>
</defs>

<!-- Background -->
<rect width="740" height="610" fill="#FAFAF7"/>
<rect width="740" height="610" fill="#FAFAF7" filter="url(#grain)" opacity="0.4"/>

<!-- Atmosphere -->
<ellipse cx="345" cy="80" rx="160" ry="80" fill="#F2CC8F" opacity="0.06" filter="url(#wash)"/>
<ellipse cx="140" cy="280" rx="150" ry="100" fill="#81B29A" opacity="0.05" filter="url(#wash)"/>
<ellipse cx="540" cy="280" rx="150" ry="100" fill="#5FA8D3" opacity="0.05" filter="url(#wash)"/>

<!-- ============================================================ -->
<!-- EXTERNAL: Reference reef larvae (moved down to avoid arrow)   -->
<!-- ============================================================ -->
<g transform="translate(20, 48)">
  <text x="0" y="0" font-family="'Source Sans 3'" font-size="10" font-weight="600" fill="#3D405B">Reference reef</text>
  <text x="0" y="13" font-family="'Source Sans 3'" font-size="10" fill="#3D405B">larvae collection</text>
  <text x="0" y="29" font-family="'DM Mono'" font-size="9" fill="#5C6B75">λ<tspan baseline-shift="sub" font-size="7">R</tspan> = 1.26 × 10⁶ yr⁻¹</text>
  <line x1="120" y1="6" x2="234" y2="6" stroke="#6B7680" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a-slate)"/>
</g>

<!-- ============================================================ -->
<!-- LABORATORY                                                    -->
<!-- ============================================================ -->
<g transform="translate(236, 8)" filter="url(#lift)">
  <rect x="0" y="0" width="260" height="5" rx="2.5" fill="#D4A66A"/>
  <rect x="0" y="5" width="260" height="118" rx="10" fill="url(#lab-f)" stroke="#D4A66A" stroke-opacity="0.25" stroke-width="1"/>

  <g transform="translate(14, 22) scale(1.0)" fill="none" stroke="#D4A66A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 3h6v8l4 7H5l4-7V3z"/><path d="M9 3h6"/><circle cx="12" cy="15" r="1" fill="#D4A66A"/>
  </g>
  <text x="44" y="32" font-family="'Source Sans 3'" font-size="16" font-weight="700" fill="#1B4965">Laboratory</text>
  <text x="44" y="46" font-family="'Source Sans 3'" font-size="10" font-weight="300" fill="#6B7680">Controlled rearing &amp; settlement</text>

  <text x="246" y="114" text-anchor="end" font-family="'DM Mono'" font-size="8" fill="#9A7340" opacity="0.45">S, T within</text>

  <g transform="translate(14, 60)">
    <text x="0" y="0" font-family="'DM Mono'" font-size="9.5" fill="#5C6B75">K<tspan baseline-shift="sub" font-size="7">lab</tspan> = 3 100 tiles</text>
    <text x="0" y="16" font-family="'DM Mono'" font-size="9.5" fill="#5C6B75">λ<tspan baseline-shift="sub" font-size="7">S</tspan> settlement rate</text>
    <rect x="130" y="-6" width="1" height="50" rx="0.5" fill="#D4A66A" opacity="0.2"/>
    <text x="140" y="0" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#1B4965">Immediate:</text>
    <text x="140" y="14" font-family="'DM Mono'" font-size="9" fill="#5C6B75">s₀ = 0.95</text>
    <text x="140" y="30" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#1B4965">1-yr retain:</text>
    <text x="140" y="44" font-family="'DM Mono'" font-size="9" fill="#5C6B75">s₁ = 0.70 → SC2</text>
  </g>
</g>

<!-- ============================================================ -->
<!-- NURSERY ORCHARD                                               -->
<!-- ============================================================ -->
<g transform="translate(18, 218)" filter="url(#lift)">
  <rect x="0" y="0" width="260" height="5" rx="2.5" fill="#3D8B6E"/>
  <rect x="0" y="5" width="260" height="118" rx="10" fill="url(#orch-f)" stroke="#81B29A" stroke-opacity="0.25" stroke-width="1"/>

  <g transform="translate(14, 22) scale(1.0)" fill="none" stroke="#3D8B6E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 22V8"/><path d="M8 12l4-4 4 4"/><path d="M6 8l6-6 6 6"/><path d="M9 22h6"/>
  </g>
  <text x="44" y="32" font-family="'Source Sans 3'" font-size="16" font-weight="700" fill="#1B4965">Nursery orchard</text>
  <text x="44" y="46" font-family="'Source Sans 3'" font-size="10" font-weight="300" fill="#6B7680">Ocean-based reef stars</text>

  <text x="246" y="114" text-anchor="end" font-family="'DM Mono'" font-size="8" fill="#9A7340" opacity="0.45">S, T, F within</text>

  <g transform="translate(14, 60)">
    <text x="0" y="0" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#1B4965">No fragmentation collection</text>
    <text x="0" y="16" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#9A7340">SC4–5 larvae → supply Lab</text>
    <text x="0" y="34" font-family="'Source Sans 3'" font-size="9.5" fill="#6B7680">Colonies grow SC2–SC4 until transplant</text>
  </g>
</g>

<!-- ============================================================ -->
<!-- RESTORATION REEF                                              -->
<!-- ============================================================ -->
<g transform="translate(438, 218)" filter="url(#lift)">
  <rect x="0" y="0" width="260" height="5" rx="2.5" fill="#1B4965"/>
  <rect x="0" y="5" width="260" height="118" rx="10" fill="url(#reef-f)" stroke="#5FA8D3" stroke-opacity="0.25" stroke-width="1"/>

  <g transform="translate(14, 22) scale(1.0)" fill="none" stroke="#1B4965" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 20c0-4 2-6 2-10a4 4 0 1 1 8 0c0 4 2 6 2 10"/>
    <path d="M12 10c0 4 2 6 2 10"/><path d="M12 10c0 4-2 6-2 10"/>
    <line x1="4" y1="20" x2="20" y2="20"/>
  </g>
  <text x="44" y="32" font-family="'Source Sans 3'" font-size="16" font-weight="700" fill="#1B4965">Restoration reef</text>
  <text x="44" y="46" font-family="'Source Sans 3'" font-size="10" font-weight="300" fill="#6B7680">Target field site — all size classes</text>

  <text x="246" y="114" text-anchor="end" font-family="'DM Mono'" font-size="8" fill="#9A7340" opacity="0.45">S, T, F within</text>

  <g transform="translate(14, 60)">
    <text x="0" y="0" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#1B4965">Density-dependent</text>
    <text x="0" y="15" font-family="'DM Mono'" font-size="9" fill="#5C6B75">S = exp(−m₁ · N)</text>
    <text x="0" y="34" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#B85A40">Disturbance: </text>
    <text x="74" y="34" font-family="'DM Mono'" font-size="9" fill="#5C6B75">none / 5-yr / 3-yr</text>
    <text x="0" y="50" font-family="'Source Sans 3'" font-size="9.5" fill="#6B7680">Wild recruitment + outplanting</text>
  </g>
</g>

<!-- ============================================================ -->
<!-- FLOWS                                                         -->
<!-- ============================================================ -->

<!-- Lab → Orchard -->
<path d="M 268,131 C 230,162 148,188 135,218"
      fill="none" stroke="#3D8B6E" stroke-width="2.8" stroke-linecap="round" marker-end="url(#a-teal)"/>
<g transform="translate(130, 172)">
  <rect x="-5" y="-13" width="82" height="26" rx="5" fill="#FAFAF7" fill-opacity="0.95"/>
  <text x="0" y="-1" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#2D6B52">Outplant to</text>
  <text x="0" y="11" font-family="'Source Sans 3'" font-size="9" fill="#4A7D64">orchard nursery</text>
</g>

<!-- Lab → Reef -->
<path d="M 450,131 C 490,162 548,188 558,218"
      fill="none" stroke="#1B4965" stroke-width="2.8" stroke-linecap="round" marker-end="url(#a-navy)"/>
<g transform="translate(502, 160)">
  <rect x="-5" y="-13" width="78" height="26" rx="5" fill="#FAFAF7" fill-opacity="0.95"/>
  <text x="0" y="-1" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#1B4965">Direct outplant</text>
  <text x="0" y="11" font-family="'Source Sans 3'" font-size="9" fill="#3A7DA6">to reef</text>
</g>

<!-- Orchard → Reef -->
<path d="M 278,341 C 326,375 400,375 438,341"
      fill="none" stroke="#E07A5F" stroke-width="2.8" stroke-linecap="round" marker-end="url(#a-coral)"/>
<g transform="translate(298, 365)">
  <rect x="-5" y="-13" width="102" height="26" rx="5" fill="#FAFAF7" fill-opacity="0.95"/>
  <text x="0" y="-1" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#B85A40">Transplant to reef</text>
  <text x="0" y="11" font-family="'Source Sans 3'" font-size="9" fill="#B85A40" opacity="0.75">nursery-grown colonies</text>
</g>

<!-- Larvae feedback: Orchard → Lab (left margin) -->
<path d="M 18,280 C 6,245 6,170 6,120 C 6,80 100,48 236,42"
      fill="none" stroke="#9A7340" stroke-width="1.2" stroke-dasharray="5 4" stroke-linecap="round" marker-end="url(#a-sand)"/>
<g transform="translate(14, 188)">
  <rect x="-7" y="-11" width="64" height="22" rx="4" fill="#FAFAF7" fill-opacity="0.95"/>
  <text x="0" y="3" font-family="'Source Sans 3'" font-size="8.5" font-weight="500" fill="#9A7340">Orch. larvae</text>
</g>

<!-- Larvae feedback: Reef → Lab -->
<path d="M 668,218 C 668,170 590,58 498,30"
      fill="none" stroke="#9A7340" stroke-width="1.2" stroke-dasharray="5 4" stroke-linecap="round" marker-end="url(#a-sand)"/>
<g transform="translate(590, 100)">
  <rect x="-5" y="-12" width="58" height="24" rx="4" fill="#FAFAF7" fill-opacity="0.95"/>
  <text x="0" y="3" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#9A7340">Reef larvae</text>
</g>

<!-- Wild recruitment → Reef -->
<line x1="730" y1="300" x2="700" y2="300" stroke="#6B7680" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#a-slate)"/>
<g transform="translate(716, 288)">
  <text x="0" y="0" text-anchor="end" font-family="'Source Sans 3'" font-size="9.5" font-weight="600" fill="#3D405B">Wild recruitment (λ)</text>
</g>

<!-- ============================================================ -->
<!-- DECISION POINTS (amber pills only — NO navy Fig bubbles)      -->
<!-- ============================================================ -->

<!-- prop (allocation) -->
<g transform="translate(358, 158)">
  <rect x="-30" y="-14" width="60" height="28" rx="14" fill="#FEF3C7" stroke="#D4A66A" stroke-width="1.2"/>
  <text x="0" y="4" text-anchor="middle" font-family="'DM Mono'" font-size="10" font-weight="500" fill="#92400E">prop</text>
</g>

<!-- retain -->
<g transform="translate(500, 88)">
  <rect x="-34" y="-14" width="68" height="28" rx="14" fill="#FEF3C7" stroke="#D4A66A" stroke-width="1.2"/>
  <text x="0" y="4" text-anchor="middle" font-family="'DM Mono'" font-size="10" font-weight="500" fill="#92400E">retain</text>
</g>

<!-- size -->
<g transform="translate(408, 365)">
  <rect x="-26" y="-14" width="52" height="28" rx="14" fill="#FEF3C7" stroke="#D4A66A" stroke-width="1.2"/>
  <text x="0" y="4" text-anchor="middle" font-family="'DM Mono'" font-size="10" font-weight="500" fill="#92400E">size</text>
</g>

<!-- ============================================================ -->
<!-- SIZE CLASS STRIP (with generous spacing below diagram)        -->
<!-- ============================================================ -->
<g transform="translate(28, 420)">
  <text x="0" y="0" font-family="'Source Sans 3'" font-size="11" font-weight="700" fill="#1B4965">Size classes</text>
  <text x="90" y="0" font-family="'Source Sans 3'" font-size="9" fill="#6B7680">(cm² colony area)</text>

  <g transform="translate(0, 14)">
    <use href="#coral-nub" x="0" y="0" width="24" height="24" color="#C1A55A"/>
    <text x="28" y="18" font-family="'Source Sans 3'" font-size="10" font-weight="600" fill="#1B4965">SC1</text>
    <text x="48" y="18" font-family="'DM Mono'" font-size="9" fill="#6B7680">0–10</text>
  </g>
  <g transform="translate(95, 6)">
    <image href="elkhorn_coral_ian.svg" x="0" y="0" width="32" height="26" opacity="0.55"/>
    <text x="30" y="17" font-family="'Source Sans 3'" font-size="10" font-weight="600" fill="#1B4965">SC2</text>
    <text x="52" y="17" font-family="'DM Mono'" font-size="8.5" fill="#6B7680">10–100</text>
  </g>
  <g transform="translate(195, 0)">
    <image href="elkhorn_coral_ian.svg" x="0" y="0" width="38" height="30" opacity="0.6"/>
    <text x="42" y="24" font-family="'Source Sans 3'" font-size="10" font-weight="600" fill="#1B4965">SC3</text>
    <text x="64" y="24" font-family="'DM Mono'" font-size="8.5" fill="#6B7680">100–900</text>
  </g>
  <g transform="translate(320, -8)">
    <image href="elkhorn_coral_ian.svg" x="0" y="0" width="50" height="40" opacity="0.65"/>
    <text x="54" y="32" font-family="'Source Sans 3'" font-size="10" font-weight="600" fill="#1B4965">SC4</text>
    <text x="76" y="32" font-family="'DM Mono'" font-size="8.5" fill="#6B7680">900–4000</text>
    <text x="76" y="44" font-family="'Source Sans 3'" font-size="8.5" fill="#B85A40">♀ reproductive</text>
  </g>
  <g transform="translate(475, -18)">
    <image href="elkhorn_coral_ian.svg" x="0" y="0" width="66" height="53" opacity="0.7"/>
    <text x="70" y="38" font-family="'Source Sans 3'" font-size="10" font-weight="600" fill="#1B4965">SC5</text>
    <text x="92" y="38" font-family="'DM Mono'" font-size="8.5" fill="#6B7680">&gt;4000</text>
    <text x="92" y="50" font-family="'Source Sans 3'" font-size="8.5" fill="#B85A40">♀ repro. ⚡ frag.</text>
  </g>

  <!-- Growth/shrinkage -->
  <line x1="8" y1="60" x2="480" y2="60" stroke="#4A7D64" stroke-width="1" stroke-opacity="0.35"/>
  <path d="M 475,60 L 485,60" stroke="#4A7D64" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <path d="M 13,60 L 3,60" stroke="#B85A40" stroke-width="1.2" marker-end="url(#a-shrink)"/>
  <text x="160" y="73" text-anchor="middle" font-family="'Source Sans 3'" font-size="9" fill="#4A7D64" font-weight="600" font-style="italic">growth →</text>
  <text x="355" y="73" text-anchor="middle" font-family="'Source Sans 3'" font-size="9" fill="#B85A40" font-weight="400" font-style="italic">← shrinkage</text>
</g>

<!-- Separator: size strip → equation -->
<line x1="40" y1="518" x2="700" y2="518" stroke="#1B4965" stroke-width="0.3" stroke-opacity="0.1"/>

<!-- ============================================================ -->
<!-- EQUATION                                                      -->
<!-- ============================================================ -->
<g transform="translate(370, 535)">
  <rect x="-160" y="-16" width="320" height="30" rx="15" fill="#1B4965" fill-opacity="0.04" stroke="#1B4965" stroke-opacity="0.12" stroke-width="0.8"/>
  <text x="0" y="4" text-anchor="middle" font-family="'DM Mono'" font-size="12" font-weight="500" fill="#1B4965">N(t+1) = (T + F) · (S ⊙ N(t)) + R</text>
</g>

<!-- Separator: equation → legend -->
<line x1="40" y1="560" x2="700" y2="560" stroke="#1B4965" stroke-width="0.3" stroke-opacity="0.1"/>

<!-- ============================================================ -->
<!-- LEGEND (two rows, well spaced)                                -->
<!-- ============================================================ -->
<g transform="translate(38, 575)">
  <!-- Row 1: flow types -->
  <line x1="0" y1="0" x2="22" y2="0" stroke="#3D8B6E" stroke-width="2.5" stroke-linecap="round"/>

  <line x1="88" y1="0" x2="110" y2="0" stroke="#B85A40" stroke-width="2.5" stroke-linecap="round"/>

  <text x="216" y="4" font-family="'Source Sans 3'" font-size="9" fill="#3D405B">Direct outplant</text>

  <line x1="320" y1="0" x2="342" y2="0" stroke="#6B7680" stroke-width="1.8" stroke-dasharray="5 3" stroke-linecap="round"/>
  <text x="346" y="4" font-family="'Source Sans 3'" font-size="9" fill="#3D405B">External input</text>

  <line x1="440" y1="0" x2="462" y2="0" stroke="#9A7340" stroke-width="1.6" stroke-dasharray="5 3" stroke-linecap="round"/>
  <text x="466" y="4" font-family="'Source Sans 3'" font-size="9" fill="#3D405B">Larvae feedback</text>

  <rect x="568" y="-9" width="50" height="20" rx="10" fill="#FEF3C7" stroke="#D4A66A" stroke-width="0.8"/>
  <text x="593" y="4" text-anchor="middle" font-family="'Source Sans 3'" font-size="8" fill="#92400E">decision</text>
  <text x="624" y="4" font-family="'Source Sans 3'" font-size="9" fill="#3D405B">Decision point</text>

  <!-- Row 2: equation key + sim specs -->
  <text x="0" y="20" font-family="'DM Mono'" font-size="9" fill="#5C6B75">S</text>
  <text x="12" y="20" font-family="'Source Sans 3'" font-size="9" fill="#6B7680">survival</text>
  <text x="68" y="20" font-family="'DM Mono'" font-size="9" fill="#5C6B75">T</text>
  <text x="80" y="20" font-family="'Source Sans 3'" font-size="9" fill="#6B7680">transition</text>
  <text x="144" y="20" font-family="'DM Mono'" font-size="9" fill="#5C6B75">F</text>
  <text x="156" y="20" font-family="'Source Sans 3'" font-size="9" fill="#6B7680">fragmentation</text>
  <text x="250" y="20" font-family="'DM Mono'" font-size="9" fill="#5C6B75">R</text>
  <text x="262" y="20" font-family="'Source Sans 3'" font-size="9" fill="#6B7680">recruitment</text>
  <text x="340" y="20" font-family="'Source Sans 3'" font-size="9" fill="#6B7680">⊙ element-wise</text>
  <text x="480" y="20" font-family="'Source Sans 3'" font-size="9" fill="#6B7680" font-style="italic">Annual time step · 50 yr · 100 replicates</text>
</g>

</svg>
</body>
</html>
